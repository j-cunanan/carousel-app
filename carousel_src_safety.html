<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>LLM Safety Backfire carousel — LLMAW</title>
<style>
/* __FONTS__ */

:root {
  --bg: #F4F2EC;
  --bg-top: #E9E6DF;
  --fg: #16140F;
  --ink-soft: rgba(20, 18, 14, 0.78);
  --primary: #C0552E;
  --muted: rgba(20, 18, 14, 0.55);
  --rule: rgba(20, 18, 14, 0.28);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #555;
  font-family: 'Archivo', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 40px;
  padding: 40px 0;
}

.slide {
  width: 1080px;
  height: 1350px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(180deg, var(--bg-top) 0%, #F1EEE6 48%, var(--bg) 100%);
  color: var(--fg);
  flex: 0 0 auto;
}

.handle {
  position: absolute;
  top: 68px;
  left: 78px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.handle svg { display: block; }
.handle span {
  font-size: 27px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--fg);
}

.zone { position: absolute; pointer-events: none; }
.zone.top-right { top: 40px; right: 40px; width: 160px; height: 80px; }
.zone.bottom-handle { bottom: 40px; left: 340px; width: 400px; height: 60px; }

#slide-1 {
  background: linear-gradient(180deg,
    #E8E4D6 0%, #E8E4D6 38%,
    #F0ECE2 46%, #F4F2EC 52%, #F4F2EC 100%);
}

.s1-art {
  position: absolute;
  top: 0;
  left: 0;
  width: 1080px;
  height: 514px;
  background: url('../assets/cover_safety_bypass.png') center / cover no-repeat;
  background-color: #2A2520;
}
.s1-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(42, 37, 32, 0) 70%, #E8E4D6 100%);
}

.s1-content {
  position: absolute;
  left: 120px;
  right: 120px;
  bottom: 110px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.kicker {
  display: flex;
  align-items: center;
  gap: 28px;
  width: 100%;
  margin-bottom: 36px;
}
.kicker::before, .kicker::after {
  content: '';
  flex: 1;
  height: 2px;
  background: var(--rule);
}
.kicker em {
  font-style: normal;
  font-size: 25px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-soft);
  white-space: nowrap;
}

.headline {
  font-size: 86px;
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.06;
  color: var(--fg);
}
.headline .accent { color: var(--primary); }

.sub {
  margin-top: 34px;
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 0.005em;
  color: var(--ink-soft);
  max-width: 740px;
}

.swipe {
  margin-top: 64px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.swipe span {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fg);
}
.swipe .chip {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
}
.swipe .chip svg { display: block; }

.dots {
  margin-top: 36px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.dots .dash {
  width: 34px;
  height: 9px;
  border-radius: 5px;
  background: var(--primary);
}
.dots .dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: rgba(20, 18, 14, 0.28);
}

.edge-next {
  position: absolute;
  top: 680px;
  right: 26px;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: 2px solid rgba(20, 18, 14, 0.45);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ---- slide 2: tweet proof ---- */

.s2-kicker {
  position: absolute;
  top: 196px;
  left: 120px;
  right: 120px;
}

/* tweet screenshot captured by capture_tweet_page.py */
.tweet-shot {
  position: absolute;
  top: 352px;
  left: 110px;
  width: 860px;
  display: block;
  border-radius: 24px;
  box-shadow: 0 30px 70px rgba(20, 18, 14, 0.22);
}

.s2-caption {
  position: absolute;
  left: 120px;
  right: 120px;
  bottom: 130px;
  text-align: center;
  font-size: 27px;
  font-weight: 600;
  color: var(--ink-soft);
}
.s2-caption strong { font-weight: 800; color: var(--fg); }

.dots.s2 {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 80px;
  justify-content: center;
  margin-top: 0;
}
</style>
</head>
<body>

<div class="slide" id="slide-1">
  <div class="s1-art"></div>
  <div class="handle">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="20" height="20" rx="5.5" fill="#16140F"/>
      <circle cx="12" cy="12" r="4.4" stroke="#F4F2EC" stroke-width="1.8"/>
      <circle cx="17.2" cy="6.8" r="1.3" fill="#F4F2EC"/>
    </svg>
    <span>@llmaw</span>
  </div>
  <div class="zone top-right"></div>
  <div class="edge-next">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M9 5l7 7-7 7" stroke="rgba(20,18,14,0.6)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <div class="s1-content">
    <div class="kicker"><em>Security</em></div>
    <h1 class="headline">LLM safety<br><span class="accent">weaponized</span></h1>
    <p class="sub">Malware devs trigger AI refusals to bypass security scanners</p>
    <div class="swipe">
      <span>Swipe for more</span>
      <div class="chip">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M9 5l7 7-7 7" stroke="#F4F2EC" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
    <div class="dots">
      <div class="dash"></div><div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
  </div>
  <div class="zone bottom-handle"></div>
</div>

<div class="slide" id="slide-2">
  <div class="handle">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="none">
      <rect x="2" y="2" width="20" height="20" rx="5.5" fill="#16140F"/>
      <circle cx="12" cy="12" r="4.4" stroke="#F4F2EC" stroke-width="1.8"/>
      <circle cx="17.2" cy="6.8" r="1.3" fill="#F4F2EC"/>
    </svg>
    <span>@llmaw</span>
  </div>
  <div class="zone top-right"></div>
  <div class="kicker s2-kicker"><em>The receipt</em></div>
  <img class="tweet-shot" src="../assets/tweet_jsrailton.png" alt="John Scott-Railton on X about LLM safety refusals exploited by malware">

  <div class="s2-caption"><strong>John Scott-Railton</strong> on why AI safety alignment creates blind spots attackers exploit.</div>

  <div class="dots s2">
    <div class="dot"></div><div class="dash"></div><div class="dot"></div>
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
  <div class="zone bottom-handle"></div>
</div>

</body>
</html>
